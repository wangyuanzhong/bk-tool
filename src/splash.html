<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>启动中 - BK 系统数据处理工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 400px;
    height: 300px;
    background: linear-gradient(160deg, #fff0f5 0%, #e6f7ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', 'Quicksand', sans-serif;
    overflow: hidden;
    position: relative;
  }
  
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.5;
    animation: floatOrb 8s ease-in-out infinite;
  }
  .orb-1 { width: 150px; height: 150px; background: #ff9ec6; top: -40px; left: -30px; }
  .orb-2 { width: 120px; height: 120px; background: #a8e6cf; bottom: -30px; right: -20px; animation-delay: -3s; }
  
  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(15px, -10px) scale(1.05); }
  }
  
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  
  h1 {
    font-size: 1.5rem;
    color: #5a4a6a;
    margin-bottom: 8px;
    font-weight: 800;
  }
  
  .subtitle {
    font-size: 0.9rem;
    color: #9b8aa5;
    margin-bottom: 30px;
  }
  
  .loader {
    width: 200px;
    height: 6px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 3px;
    overflow: hidden;
    margin: 0 auto 15px;
  }
  
  .loader-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ff9ec6, #d4a5ff);
    border-radius: 3px;
    animation: loading 2s ease-in-out infinite;
  }
  
  @keyframes loading {
    0% { width: 0%; margin-left: 0%; }
    50% { width: 70%; margin-left: 30%; }
    100% { width: 0%; margin-left: 100%; }
  }
  
  .status {
    font-size: 0.8rem;
    color: #9b8aa5;
    animation: pulse 1.5s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  
  <div class="content">
    <h1>BK 系统数据处理工具</h1>
    <div class="subtitle">正在启动...</div>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
    <div class="status">初始化 WebView2 运行时</div>
  </div>
  
  <script>
    // 3秒后自动关闭启动画面
    setTimeout(function() {
      if (window.pywebview) {
        window.pywebview.api.close_splash();
      }
    }, 3000);
  </script>
</body>
</html>
